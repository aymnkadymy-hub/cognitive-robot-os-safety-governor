# Build PD for seL4/Microkit: custom target + build-std.
# Path is relative to this crate directory; build from here (see docs/ENVIRONMENT.md §3).
[build]
target = "../../tools/rust-sel4/support/targets/aarch64-sel4-microkit.json"

[unstable]
build-std = ["core", "compiler_builtins", "alloc"]
build-std-features = ["compiler-builtins-mem"]
